services:
  tidal-collaborative:
    image: elphiene/tidal-collaborative:latest
    container_name: tidal-collaborative
    restart: unless-stopped

    ports:
      - "3000:3000"

    volumes:
      # SQLite database — survives container restarts and image rebuilds.
      # Secrets (encryption key, session secret) are also stored here.
      - /DATA/AppData/tidal-collaborative:/app/data

    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/db.sqlite

    networks:
      - tidal-network

    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3000/api/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # Resource limits — reasonable for a home-lab SQLite server
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  tidal-network:
    driver: bridge
