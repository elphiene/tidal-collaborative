x-casaos:
  architectures:
    - amd64
    - arm64
  main: tidal-collaborative
  author: elphiene
  category: Media
  title:
    en_us: Tidal Collaborative
  tagline:
    en_us: Collaborative Tidal playlist sync
  description:
    en_us: Self-hosted server that lets multiple users share and sync Tidal playlists in real time. Changes propagate automatically — no browser extension required.
  port_map: "3000"
  scheme: http
  index: /
  tips: {}

services:
  tidal-collaborative:
    image: elphiene/tidal-collaborative:latest
    pull_policy: always
    container_name: tidal-collaborative
    restart: unless-stopped

    ports:
      - "3000:3000"

    volumes:
      # SQLite database — survives container restarts and image rebuilds.
      # Secrets (encryption key, session secret) are also stored here.
      - /DATA/AppData/tidal-collaborative:/app/data

    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/db.sqlite
      # Recommended for production: set these explicitly (see server/.env.example
      # for how to generate them) rather than relying on the auto-generated
      # fallback, which stores the key in the same SQLite file as the data it
      # encrypts — anyone who obtains db.sqlite gets the key too (AUDIT.md M5).
      # - ENCRYPTION_KEY=
      # - SESSION_SECRET=

    networks:
      - tidal-network

    healthcheck:
      # curl isn't in the Alpine image — use wget (busybox built-in).
      # Matches the Dockerfile HEALTHCHECK directive.
      # Use 127.0.0.1 explicitly — localhost resolves to ::1 first inside the
      # container and the server only listens on IPv4.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/ping | grep -q '\"ok\":true' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # Resource limits — reasonable for a home-lab SQLite server
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  tidal-network:
    driver: bridge
